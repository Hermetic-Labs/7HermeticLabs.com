<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermetic Labs - Research Papers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e5e5e5;
            --accent-color: #3b82f6;
            --card-bg: #171717;
            --card-hover: #262626;
            --border-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(23,23,23,1) 0%, rgba(10,10,10,1) 100%);
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #a3a3a3;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        main {
            width: 100%;
            max-width: 800px;
            padding: 4rem 2rem;
            flex-grow: 1;
        }

        .paper-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .paper-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .paper-card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
            border-color: #555;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .paper-info h2 {
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
            font-weight: 400;
        }

        .paper-info p {
            font-size: 0.9rem;
            color: #888;
            margin: 0;
        }

        .download-icon {
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            padding: 0.75rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .paper-card:hover .download-icon {
            background: var(--accent-color);
            color: #fff;
        }

        .download-icon svg {
            width: 24px;
            height: 24px;
        }

        footer {
            width: 100%;
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<header>
    <h1>Hermetic Labs</h1>
    <p class="subtitle">Public Research & White Papers</p>
</header>

<main>
    <div class="paper-list">
        <a href="Compliance-by-Design-White-Paper-Final.pdf" class="paper-card" target="_blank" rel="noopener noreferrer">
            <div class="paper-info">
                <h2>Compliance by Design</h2>
                <p>White Paper</p>
            </div>
            <div class="download-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </a>

        <a href="Employment-Resilience-White-Paper-Final.pdf" class="paper-card" target="_blank" rel="noopener noreferrer">
            <div class="paper-info">
                <h2>Employment Resilience</h2>
                <p>White Paper</p>
            </div>
            <div class="download-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </a>

        <a href="The Fiduciary Case for Local First AI.pdf" class="paper-card" target="_blank" rel="noopener noreferrer">
            <div class="paper-info">
                <h2>The Fiduciary Case for Local First AI</h2>
                <p>White Paper</p>
            </div>
            <div class="download-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </a>

        <a href="The-Monoculture-Problem-White-Paper-Final (1).pdf" class="paper-card" target="_blank" rel="noopener noreferrer">
            <div class="paper-info">
                <h2>The Monoculture Problem</h2>
                <p>White Paper</p>
            </div>
            <div class="download-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
        </a>
    </div>
</main>

<footer>
    &copy; 2026 Hermetic Labs. All rights reserved.
</footer>

</body>
</html>
